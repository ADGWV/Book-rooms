*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Tajawal',sans-serif;background:var(--dark);color:var(--text);min-height:100vh}

.logo{display:flex;align-items:center;gap:14px}

.logo-text h1{font-size:20px;font-weight:800;color:var(--gold);letter-spacing:1px}
.logo-text p{font-size:12px;color:var(--text-muted);font-weight:300}
.header-stats{display:flex;gap:16px}
.stat-badge{text-align:center;background:var(--dark3);border:1px solid var(--border);border-radius:10px;padding:8px 18px}
.stat-badge .num{font-size:22px;font-weight:800;color:var(--gold)}
.stat-badge .lbl{font-size:11px;color:var(--text-muted)}

.page-title h2{font-size:32px;font-weight:800;color:var(--gold);margin-bottom:8px}
.page-title p{color:var(--text-muted);font-size:15px}
.floor-section{margin-bottom:40px}
.floor-header{display:flex;align-items:center;gap:16px;margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid var(--border)}
.floor-badge{background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:var(--dark);font-weight:800;font-size:14px;padding:6px 16px;border-radius:20px;white-space:nowrap}
.floor-title{font-size:20px;font-weight:700;color:var(--text)}
.floor-count{margin-right:auto;font-size:13px;color:var(--text-muted);background:var(--dark3);padding:4px 12px;border-radius:20px;border:1px solid var(--border)}
.rooms-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:14px}
.room-card{background:var(--dark3);border:2px solid var(--border);border-radius:14px;padding:18px 12px;text-align:center;cursor:pointer;transition:all .25s ease;position:relative;overflow:hidden}
.room-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--available);transition:all .25s}

.room-guests{font-size:11px;color:var(--text-muted);margin-top:6px}

.back-btn:hover{border-color:var(--gold);color:var(--gold)}
.booking-header{background:linear-gradient(135deg,var(--dark2),#1C1408);border:1px solid var(--border);border-radius:16px;padding:28px;margin-bottom:30px;display:flex;align-items:center;gap:24px}
.room-big-number{background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:var(--dark);font-size:40px;font-weight:800;width:90px;height:90px;border-radius:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 8px 25px rgba(201,168,76,.3)}
.room-big-info h3{font-size:22px;font-weight:700;color:var(--text);margin-bottom:6px}
.room-big-info p{color:var(--text-muted);font-size:14px}
.guests-section{margin-bottom:20px}
.section-title{font-size:18px;font-weight:700;color:var(--gold);margin-bottom:16px;display:flex;align-items:center;gap:10px}
.section-title::after{content:'';flex:1;height:1px;background:var(--border)}
.no-guests{background:var(--dark3);border:1px dashed var(--border);border-radius:12px;padding:30px;text-align:center;color:var(--text-muted);font-size:14px}
.guest-card{background:var(--dark3);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:14px;transition:border-color .2s}
.guest-card:hover{border-color:rgba(201,168,76,.4)}
.guest-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.guest-name-display{font-size:17px;font-weight:700;color:var(--text)}
.guest-actions{display:flex;gap:8px}
.btn-edit,.btn-delete{padding:6px 14px;border-radius:8px;border:none;font-family:'Tajawal',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s}

.btn-edit:hover{background:rgba(201,168,76,.3)}
.btn-delete{background:rgba(231,76,60,.15);color:var(--booked);border:1px solid rgba(231,76,60,.3)}
.btn-delete:hover{background:rgba(231,76,60,.3)}
.guest-details{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}

.booking-form{background:var(--dark2);border:1px solid var(--border);border-radius:16px;padding:30px}
.form-title{font-size:17px;font-weight:700;color:var(--gold);margin-bottom:24px;padding-bottom:14px;border-bottom:1px solid var(--border)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:18px}
.form-group{display:flex;flex-direction:column;gap:8px}
label{font-size:13px;font-weight:600;color:var(--text-muted);letter-spacing:.5px}

    </div>
  </div>
  <div class="header-stats">

  </div>
</header>

<div id="floors-page">
  <div class="page-title">
    <h2>🏨 غرف الفندق</h2>
    <p>اختر غرفة لعرض تفاصيل الحجز أو إضافة حجز جديد</p>
  </div>
  <div id="floors-container"></div>
</div>

<div id="booking-page">
  <button class="back-btn" onclick="goBack()">← العودة للغرف</button>
  <div class="booking-header">
    <div class="room-big-number" id="bp-room-num">101</div>
    <div class="room-big-info">
      <h3 id="bp-room-title">غرفة 101</h3>
      <p id="bp-room-status-text">الحالة: متاحة</p>
    </div>
  </div>
  <div class="guests-section">
    <div class="section-title">قائمة الحجوزات</div>
    <div id="guests-list"></div>
  </div>
  <button class="btn-add-guest" id="add-guest-btn" onclick="showAddForm()">＋ إضافة حجز جديد</button>
  <div class="booking-form" id="booking-form" style="display:none">
    <div class="form-title" id="form-title">📋 بيانات الحجز</div>
    <input type="hidden" id="edit-index" value="-1">
    <div class="form-grid">
      <div class="form-group"><label>اسم العميل</label><input type="text" id="f-name" placeholder="أدخل الاسم الكامل"></div>
      <div class="form-group"><label>رقم الهاتف</label><input type="tel" id="f-phone" placeholder="01xxxxxxxxx"></div>
      <div class="form-group"><label>تاريخ بداية الحجز</label><input type="date" id="f-checkin"></div>
      <div class="form-group"><label>تاريخ نهاية الحجز</label><input type="date" id="f-checkout"></div>
    </div>
    <div class="form-actions">
      <button class="btn-save" onclick="saveGuest()">💾 حفظ</button>
      <button class="btn-cancel-form" onclick="cancelForm()">إلغاء</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<div class="overlay" id="confirm-overlay">
  <div class="confirm-box">
    <h3>⚠️ تأكيد الحذف</h3>
    <p>هل أنت متأكد من حذف بيانات هذا العميل؟ لا يمكن التراجع.</p>
    <div class="confirm-btns">
      <button class="btn-confirm-delete" onclick="confirmDelete()">نعم، احذف</button>
      <button class="btn-confirm-cancel" onclick="closeConfirm()">إلغاء</button>
    </div>
  </div>
</div>

  {name:'الدور الثاني',label:'الثاني',rooms:['201','202','203','204','206','207','208','209']},
  {name:'الدور الثالث',label:'الثالث',rooms:['301','302','303','304','305','306','307','308','309']},
  {name:'الدور الرابع',label:'الرابع',rooms:['401','402','403','404','405','406','407','408','409']},
  {name:'قاعة',label:'قاعة',rooms:['قاعه 1','قاعه 2','تنس','قاعه 4','قاعه كراسي','بلياردو - جيم']}
];
let currentRoom=null,deleteIndex=null;
function getData(){try{return JSON.parse(localStorage.getItem('hotelData')||'{}')}catch{return{}}}
function saveData(d){localStorage.setItem('hotelData',JSON.stringify(d))}
function getRoomGuests(r){return getData()[r]||[]}
function setRoomGuests(r,g){const d=getData();d[r]=g;saveData(d)}
function isRoomBooked(r){
  const g=getRoomGuests(r);
  if(!g.length)return false;
  const today=new Date().toISOString().split('T')[0];
  return g.some(x=>x.checkout>=today);
}
function renderFloors(){
  const c=document.getElementById('floors-container');
  c.innerHTML='';
  let total=0,booked=0;
  FLOORS.forEach((floor,fi)=>{
    const sec=document.createElement('div');
    sec.className='floor-section';
    const cards=floor.rooms.map(rn=>{
      total++;
      const b=isRoomBooked(rn);
      if(b)booked++;
      const gc=getRoomGuests(rn).length;
      return `<div class="room-card${b?' booked':''}" onclick="openRoom('${rn}','${floor.name}')">
        <div class="room-number">${rn}</div>
        <div class="room-status ${b?'booked':'available'}">${b?'محجوزة':'متاحة'}</div>
        ${gc?`<div class="room-guests">${gc} حجز</div>`:''}
      </div>`;
    }).join('');
    sec.innerHTML=`<div class="floor-header">
      <span class="floor-badge">الدور ${floor.label}</span>
      <span class="floor-title">${floor.name}</span>
      <span class="floor-count">${floor.rooms.length} غرفة</span>
    </div><div class="rooms-grid">${cards}</div>`;
    c.appendChild(sec);
  });
  document.getElementById('stat-total').textContent=total;
  document.getElementById('stat-booked').textContent=booked;
  document.getElementById('stat-available').textContent=total-booked;
}
function openRoom(rn,floorName){
  currentRoom=rn;
  document.getElementById('floors-page').style.display='none';
  document.getElementById('booking-page').style.display='block';
  document.getElementById('bp-room-num').textContent=rn;
  document.getElementById('bp-room-title').textContent=floorName+' - غرفة '+rn;
  cancelForm();renderGuests();
}
function goBack(){
  document.getElementById('booking-page').style.display='none';
  document.getElementById('floors-page').style.display='block';
  renderFloors();
}
function renderGuests(){
  const g=getRoomGuests(currentRoom);
  const list=document.getElementById('guests-list');
  const b=isRoomBooked(currentRoom);
  document.getElementById('bp-room-status-text').textContent='الحالة: '+(b?'🔴 محجوزة حالياً':'🟢 متاحة');
  if(!g.length){list.innerHTML='<div class="no-guests">لا توجد حجوزات لهذه الغرفة حتى الآن</div>';return;}
  list.innerHTML=g.map((x,i)=>`<div class="guest-card">
    <div class="guest-card-header">
      <div class="guest-name-display">👤 ${x.name}</div>
      <div class="guest-actions">
        <button class="btn-edit" onclick="editGuest(${i})">✏️ تعديل</button>
        <button class="btn-delete" onclick="askDelete(${i})">🗑️ حذف</button>
      </div>
    </div>
    <div class="guest-details">
      <div class="guest-detail-item"><div class="detail-label">📞 رقم الهاتف</div><div class="detail-value">${x.phone}</div></div>
      <div class="guest-detail-item"><div class="detail-label">📅 تاريخ الوصول</div><div class="detail-value">${fmt(x.checkin)}</div></div>
      <div class="guest-detail-item"><div class="detail-label">📅 تاريخ المغادرة</div><div class="detail-value">${fmt(x.checkout)}</div></div>
    </div>
  </div>`).join('');
}
function fmt(d){if(!d)return'-';const[y,m,day]=d.split('-');return day+'/'+m+'/'+y}
function showAddForm(){
  document.getElementById('edit-index').value=-1;
  document.getElementById('form-title').textContent='📋 إضافة حجز جديد';
  document.getElementById('f-name').value='';
  document.getElementById('f-phone').value='';
  document.getElementById('f-checkin').value='';
  document.getElementById('f-checkout').value='';
  document.getElementById('booking-form').style.display='block';
  document.getElementById('add-guest-btn').style.display='none';
  document.getElementById('booking-form').scrollIntoView({behavior:'smooth'});
}
function editGuest(i){
  const g=getRoomGuests(currentRoom)[i];
  document.getElementById('edit-index').value=i;
  document.getElementById('form-title').textContent='✏️ تعديل بيانات الحجز';
  document.getElementById('f-name').value=g.name;
  document.getElementById('f-phone').value=g.phone;
  document.getElementById('f-checkin').value=g.checkin;
  document.getElementById('f-checkout').value=g.checkout;
  document.getElementById('booking-form').style.display='block';
  document.getElementById('add-guest-btn').style.display='none';
  document.getElementById('booking-form').scrollIntoView({behavior:'smooth'});
}
function isOverlap(checkin,checkout,bookings,excludeIndex){
  // bookings is array of objects with checkin and checkout strings
  const ci=new Date(checkin);
  const co=new Date(checkout);
  return bookings.some((b,i)=>{
    if(typeof excludeIndex==='number' && i===excludeIndex) return false;
    const bi=new Date(b.checkin);
    const bo=new Date(b.checkout);
    // treat bookings as [checkin,checkout] but allow new period to start on the previous checkout
    // overlap only when periods have at least one full day in common (ci < bo && co > bi)
    // this lets ci == bo or co == bi be allowed (touching boundaries).
    return ci < bo && co > bi;
  });
}

function saveGuest(){
  const name=document.getElementById('f-name').value.trim();
  const phone=document.getElementById('f-phone').value.trim();
  const checkin=document.getElementById('f-checkin').value;
  const checkout=document.getElementById('f-checkout').value;
  if(!name||!phone||!checkin||!checkout){showToast('❌ من فضلك أكمل جميع البيانات','error');return}
  if(checkout<=checkin){showToast('❌ تاريخ المغادرة يجب أن يكون بعد الوصول','error');return}
  const guests=getRoomGuests(currentRoom);
  const ei=parseInt(document.getElementById('edit-index').value);
  // verify no overlapping bookings except the one we are editing
  if(isOverlap(checkin,checkout,guests, ei>=0?ei:null)){
    showToast('❌ يوجد حجز آخر في نفس الفترة','error');
    return;
  }
  const gd={name,phone,checkin,checkout};
  if(ei>=0){guests[ei]=gd;showToast('✅ تم تعديل بيانات الحجز بنجاح','success')}
  else{guests.push(gd);showToast('✅ تم حفظ الحجز بنجاح','success')}
  setRoomGuests(currentRoom,guests);
  cancelForm();
  renderGuests();
  renderFloors(); // update status word on floor cards and stats
}
function cancelForm(){
  document.getElementById('booking-form').style.display='none';
  document.getElementById('add-guest-btn').style.display='inline-flex';
}
function askDelete(i){deleteIndex=i;document.getElementById('confirm-overlay').classList.add('show')}
function confirmDelete(){
  const g=getRoomGuests(currentRoom);
  g.splice(deleteIndex,1);
  setRoomGuests(currentRoom,g);
  closeConfirm();
  renderGuests();
  renderFloors(); // refresh floor view statuses
  showToast('🗑️ تم حذف الحجز بنجاح','success');
}
function closeConfirm(){document.getElementById('confirm-overlay').classList.remove('show');deleteIndex=null}
function showToast(msg,type){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='toast '+(type||'')+' show';
  setTimeout(()=>t.classList.remove('show'),3000);
}
renderFloors();
</script>
</body>
</html>
